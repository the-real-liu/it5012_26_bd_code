<VirtualHost *:80>
    ServerName it.yccb.me
    ServerAlias localhost
    ServerAlias lahee

    DocumentRoot /app/frontend_dist
    <Directory /app/frontend_dist>
        Require all granted
    </Directory>

    WSGIDaemonProcess django_app python-path=/app/backend
    WSGIProcessGroup django_app
    WSGIScriptAlias /django /app/backend/backend/prod.py
    WSGIPassAuthorization On
    <Directory /app/backend/backend>
        <Files prod.py>
            Require all granted
        </Files>
    </Directory>

    RewriteEngine On
    RewriteRule ^/api/(.*)$ /django/api/$1 [PT,QSA]
    RewriteRule ^/auth/(.*)$ /django/auth/$1 [PT,QSA]

</VirtualHost>

